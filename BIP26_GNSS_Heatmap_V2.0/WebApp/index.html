<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSATE-X 2.0 - GNSS Signal Heatmap</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Floating UI Panel -->
        <div class="glass-panel">
            <h1>GNSS Signal Mapper</h1>
            <p class="subtitle">TU Dublin - SENSATE-X 2.0</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Satellites</span>
                    <span class="stat-value" id="sats-val">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">HDOP</span>
                    <span class="stat-value" id="hdop-val">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Quality</span>
                    <div id="quality-indicator" class="quality-indicator"></div>
                </div>
            </div>

            <div class="connection-box">
                <input type="text" id="ip-input" placeholder="Enter ESP32 IP (e.g. 192.168.43.100)" class="ip-input">
                <button id="connect-btn" class="primary-btn">Connect via Wi-Fi</button>
            </div>
            <p id="connection-status" class="status-text">Disconnected</p>
        </div>

        <!-- Map Container -->
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Leaflet Heatmap Plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
